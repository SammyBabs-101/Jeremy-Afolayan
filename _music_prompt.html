<!-- MUSIC PROMPT (modal) -->
<div class="music-prompt" id="musicPrompt" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="prompt-box">
    <h2>Would you like to listen to a lovely song for Jeremy?</h2>
    <p>Play the song now?</p>
    <div class="prompt-actions">
      <button class="btn-yes" id="musicYes">Yes ❤️</button>
      <button class="btn-no" id="musicNo">No 😢</button>
    </div>
  </div>
</div>
